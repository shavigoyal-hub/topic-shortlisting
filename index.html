<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topic Shortlisting Tool</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#f7f8fa; --panel:#ffffff; --ink:#111827; --muted:#6b7280; --line:#e5e7eb;
    --accent:#3b46f1; --accent-d:#2a33c4; --accent-soft:#ecedfe;
    --red:#dc3a3a; --red-soft:#fdecec; --amber:#b9770e; --amber-soft:#fbf2e2;
    --green:#15a06f; --green-soft:#e6f6ef; --blue:#475569; --blue-soft:#eef1f6;
    --navy:#0c0c30; --shadow:0 1px 3px rgba(17,24,39,.07),0 6px 18px rgba(17,24,39,.05);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}
  h1,h2,h3{margin:0;font-weight:650}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  .app{display:flex;min-height:100vh}
  /* Sidebar */
  .side{width:240px;background:var(--navy);color:#d4d6ef;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .brand{padding:20px 18px;font-size:16px;font-weight:700;color:#fff;letter-spacing:-.2px;border-bottom:1px solid rgba(255,255,255,.1)}
  .brand small{display:block;font-weight:400;font-size:11px;color:#9499d8;margin-top:3px;letter-spacing:.3px}
  .steps{padding:10px 8px;flex:1;overflow:auto}
  .step{display:flex;gap:11px;align-items:flex-start;padding:11px 12px;border-radius:9px;color:#b6b9e6;cursor:pointer;margin-bottom:2px}
  .step:hover{background:rgba(255,255,255,.06)}
  .step.active{background:var(--accent);color:#fff}
  .step.done .num{background:#4954f3;color:#fff;border-color:#4954f3}
  .step .num{width:22px;height:22px;border-radius:50%;border:1.5px solid #3a3f6e;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px}
  .step.active .num{background:#fff;color:var(--accent);border-color:#fff}
  .step .lbl{font-size:13px;font-weight:600}
  .step .sub{font-size:11px;opacity:.7;font-weight:400}
  .side-foot{padding:14px 16px;font-size:11px;color:#7378b0;border-top:1px solid rgba(255,255,255,.1)}
  /* Main */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{background:var(--panel);border-bottom:1px solid var(--line);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30}
  .topbar .stat{display:flex;gap:22px}
  .stat .s{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .stat .v{font-size:18px;font-weight:700}
  .stat .bk{display:flex;gap:8px;margin-top:1px}
  .stat .bk span{font-size:10px;color:var(--muted);font-weight:600;white-space:nowrap}
  .v.green{color:var(--green)} .v.red{color:var(--red)} .v.amber{color:var(--amber)}
  .content{padding:26px 28px;max-width:1180px;width:100%}
  .pagehead{margin-bottom:18px}
  .pagehead h2{font-size:21px;letter-spacing:-.3px}
  .pagehead p{color:var(--muted);margin:6px 0 0;max-width:760px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:20px;margin-bottom:18px;box-shadow:var(--shadow)}
  .card h3{font-size:15px;margin-bottom:4px}
  .card .hint{color:var(--muted);font-size:12.5px;margin-bottom:14px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  label.fl{display:block;font-weight:600;font-size:12.5px;margin-bottom:6px}
  input[type=text],input[type=url],select,textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:#fff;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}
  .seg button{padding:9px 18px;border:0;background:#fff;color:var(--ink);font-weight:600;border-right:1px solid var(--line)}
  .seg button:last-child{border-right:0}
  .seg button.on{background:var(--accent);color:#fff}
  .btn{background:var(--accent);color:#fff;border:0;padding:10px 18px;border-radius:9px;font-weight:650;font-size:13.5px}
  .btn:hover{background:var(--accent-d)}
  .btn.sec{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn.sec:hover{background:#f3f4f6}
  .btn.ghost{background:transparent;color:var(--accent);padding:6px 10px}
  .btn.sm{padding:6px 12px;font-size:12.5px}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .row-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  /* tags */
  .tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
  .tag{display:inline-flex;align-items:center;gap:6px;background:var(--accent-soft);color:var(--accent-d);border-radius:7px;padding:4px 9px;font-size:12.5px;font-weight:600}
  .tag.r{background:var(--red-soft);color:var(--red)}
  .tag.b{background:var(--blue-soft);color:var(--blue)}
  .tag x{cursor:pointer;font-weight:700;opacity:.6}
  .tag x:hover{opacity:1}
  .taginput{display:flex;gap:8px;margin-top:4px}
  /* dropzone */
  .drop{border:2px dashed var(--line);border-radius:12px;padding:40px;text-align:center;color:var(--muted);cursor:pointer;transition:.15s}
  .drop:hover,.drop.over{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-d)}
  .drop b{color:var(--ink)}
  /* rules */
  .rule{display:flex;align-items:center;gap:14px;padding:13px 4px;border-bottom:1px solid var(--line)}
  .rule:last-child{border-bottom:0}
  .sw{position:relative;display:inline-block;width:40px;height:23px;flex-shrink:0}
  .sw input{opacity:0;width:0;height:0}
  .sw .sl{position:absolute;inset:0;background:#cbd0db;border-radius:20px;transition:.2s}
  .sw .sl:before{content:"";position:absolute;width:17px;height:17px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
  .sw input:checked+.sl{background:var(--accent)}
  .sw input:checked+.sl:before{transform:translateX(17px)}
  .rule .rt{flex:1}
  .rule .rt b{font-size:13.5px}
  .rule .rt span{display:block;color:var(--muted);font-size:12px}
  .rule .cnt{font-weight:700;color:var(--red);min-width:64px;text-align:right;font-size:13px}
  .rule .cnt.zero{color:var(--muted);font-weight:600}
  /* table */
  .tablewrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
  .tbar{display:flex;gap:10px;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .tbar input[type=text]{width:230px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:10px 12px;background:#f3f4f6;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px;position:sticky;top:0;border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap}
  th:hover{color:var(--ink)}
  td{padding:9px 12px;border-bottom:1px solid var(--line);vertical-align:top}
  tr.rejected{background:#fdf2f2}
  tr.selected{background:#eef6f1}
  tr:hover{background:#f5f6f9}
  .kw{font-weight:600}
  /* shortlist tables: fixed layout + min width so the Keyword — Topic column gets a big leftover share */
  .ftbl{table-layout:fixed;min-width:1180px}
  .ftbl td{overflow:hidden}
  .ftbl .kw{font-size:12.5px}
  /* type chip truncates to one line (full name on hover) so a long type doesn't balloon the row */
  .ichip.fam2{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:bottom}
  .sub2{color:var(--muted);font-size:11.5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;max-width:330px}
  .pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
  .pill.svc{background:var(--accent-soft);color:var(--accent-d)}
  .pill.blog{background:var(--blue-soft);color:var(--blue)}
  .pill.sel{background:var(--green-soft);color:var(--green)}
  .pill.rej{background:var(--red-soft);color:var(--red)}
  .pill.pend{background:#eef0f4;color:var(--muted)}
  .ichip{display:inline-block;background:var(--accent-soft);color:var(--accent-d);border-radius:6px;padding:1px 6px;font-size:10.5px;font-weight:600;margin:1px 3px 1px 0;white-space:nowrap}
  .ichip.mod{background:var(--amber-soft);color:var(--amber)}
  .ichip.fam{background:var(--navy);color:#fff;font-weight:700}
  .ichip.aud{background:var(--blue-soft);color:var(--blue);font-style:italic}
  .ichip.sec{background:#f1f5f9;color:#64748b;font-weight:500;max-width:130px;overflow:hidden;text-overflow:ellipsis;vertical-align:bottom}
  /* grid view */
  .gridtbl{border-collapse:separate;border-spacing:0;font-size:12px}
  .gridtbl th,.gridtbl td{border:1px solid var(--line);padding:6px 8px;text-align:center;white-space:nowrap}
  .gridtbl thead th{background:#f3f4f6;position:sticky;top:0;font-size:11px;color:var(--ink);vertical-align:bottom}
  .gridtbl .gcorner{text-align:left;color:var(--muted);font-weight:600}
  .gridtbl .grow{text-align:left;font-weight:600;background:#fafbfc;position:sticky;left:0;z-index:1}
  .ghbtns{display:inline-flex;gap:3px;margin-left:8px}
  .ghbtns button{border:1px solid var(--line);background:#fff;border-radius:5px;font-size:11px;padding:0 5px;cursor:pointer;line-height:1.6}
  .ghbtns button[data-a="select"]:hover{background:var(--green-soft);border-color:var(--green);color:var(--green)}
  .ghbtns button[data-a="reject"]:hover{background:var(--red-soft);border-color:var(--red);color:var(--red)}
  .gcell.haspen{cursor:pointer;color:var(--ink)}
  .gcell.haspen:hover{background:var(--accent-soft);outline:2px solid var(--accent);outline-offset:-2px}
  .gcell.empty{color:var(--line)}
  .gcell.kept{background:var(--green-soft)}
  .gsel{color:var(--green);font-size:10px;margin-left:3px;font-weight:700}
  /* filters view */
  .chk{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;cursor:pointer}
  .chk input{width:16px;height:16px}
  .muted{color:var(--muted)}
  .fpill{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:16px;padding:3px 11px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:var(--ink)}
  .fpill .muted{font-weight:700;opacity:.7}
  /* off-state: subtle tint + colored left accent so each axis is recognisable without shouting */
  .fpill.aud{background:#f6f8fb;border-color:#e2e8f0;color:#51607a;box-shadow:inset 3px 0 0 #94a3b8}
  .fpill.type{background:#f5f6fe;border-color:#e3e5fc;color:var(--accent-d);box-shadow:inset 3px 0 0 #8b92f5}
  .fpill.mod{background:#fbf7ee;border-color:#efe4cd;color:#a9710f;box-shadow:inset 3px 0 0 #d9a23f}
  .fpill:hover{border-color:#94a3b8}
  /* on-state: solid fill of the same hue so the selection clearly stands out */
  .fpill.on{box-shadow:none}
  .fpill.on .muted{color:#ffffffcc;opacity:1}
  .fpill.aud.on{background:var(--blue);border-color:var(--blue);color:#fff}
  .fpill.type.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .fpill.mod.on{background:var(--amber);border-color:var(--amber);color:#fff}
  /* secondary-keyword cell: one truncated line, click to expand */
  .seccell{display:block;max-width:190px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11.5px;color:#64748b;cursor:pointer}
  .seccell:hover{color:var(--accent)}
  .seccell.expanded{white-space:normal;max-width:none;overflow:visible}
  /* login gate */
  .login{position:fixed;inset:0;background:linear-gradient(135deg,#0c0c30 0%,#1f2596 55%,#3b46f1 100%);display:flex;align-items:center;justify-content:center;z-index:1000}
  .login-card{background:#fff;border-radius:18px;padding:40px 42px 34px;width:370px;max-width:92vw;box-shadow:0 24px 70px rgba(0,0,0,.35);text-align:center}
  .login-logo{font-size:27px;font-weight:800;letter-spacing:-.6px;color:var(--accent)}
  .login-logo span{color:var(--navy)}
  .login-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--accent);margin-left:2px;vertical-align:middle}
  .login-sub{color:var(--muted);font-size:13px;margin:7px 0 26px}
  .login input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:14px;box-sizing:border-box}
  .login input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);outline:none}
  .login .btn{width:100%;margin-top:14px;padding:12px}
  .login-err{color:var(--red);font-size:12.5px;min-height:17px;margin-top:11px;font-weight:600}
  .login-foot{color:var(--muted);font-size:11px;margin-top:18px}
  .signout{margin-top:8px;color:#9aa0d6;font-size:11.5px;cursor:pointer;text-decoration:underline}
  .signout:hover{color:#fff}
  /* modal */
  .modal{position:fixed;inset:0;background:rgba(12,12,48,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:24px}
  .modal-card{background:#fff;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.3);width:min(820px,100%);max-height:86vh;display:flex;flex-direction:column;overflow:hidden}
  .modal-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .modal-body{overflow:auto;padding:4px 14px 14px}
  .modal-x{border:0;background:transparent;font-size:18px;cursor:pointer;color:var(--muted)}
  .modal-x:hover{color:var(--ink)}
  /* groups view */
  .grp{border:1px solid var(--line);border-radius:10px;margin:8px 0;overflow:hidden;background:#fff}
  .grphead{display:flex;align-items:center;gap:12px;padding:10px 12px;flex-wrap:wrap}
  .caret{border:0;background:transparent;color:var(--accent);font-size:14px;cursor:pointer;padding:2px 6px;flex-shrink:0;width:26px}
  .caret:hover{color:var(--accent-d)}
  .grpchips{display:flex;align-items:center;gap:3px;font-size:12px;flex-wrap:wrap;flex:1;min-width:0}
  .grpchips .ichip{font-size:12px;padding:2px 8px}
  .plus{color:var(--muted);font-weight:700;margin:0 4px}
  .grpcounts{color:var(--muted);font-size:12px;font-weight:600}
  .grpsample{padding:0 12px 11px;color:var(--muted);font-size:12px;font-style:italic}
  .grpbtns{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
  .tag-mixed{background:var(--amber-soft);color:var(--amber);border-radius:6px;padding:2px 8px;font-size:10.5px;font-weight:700;margin-left:7px}
  .tag-clean{background:var(--green-soft);color:var(--green);border-radius:6px;padding:2px 8px;font-size:10.5px;font-weight:700;margin-left:7px}
  .grpbody{border-top:1px solid var(--line);background:#fafbfc}
  .modrow{border-bottom:1px solid var(--line)}
  .modrow:last-child{border-bottom:0}
  .modhead{display:flex;align-items:center;gap:12px;padding:9px 12px 9px 22px;flex-wrap:wrap}
  .modhead .grpchips .plus{margin:0 4px 0 0}
  .grplist{background:#fff;padding:2px 12px 2px 30px;max-height:300px;overflow:auto;border-top:1px dashed var(--line)}
  .grpitem{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line);font-size:12.5px}
  .grpitem:last-child{border-bottom:0}
  .grpitem .pill{text-transform:capitalize;min-width:62px;text-align:center}
  .gv{color:var(--muted);font-variant-numeric:tabular-nums}
  .idcell{max-width:200px;line-height:1.7}
  .profsel{padding:4px 6px;font-size:11.5px;border:1px solid var(--line);border-radius:6px;background:#fff;max-width:150px}
  .serpcell{display:flex;flex-direction:column;gap:1px;max-width:210px;max-height:120px;overflow:auto}
  .serpcell a{font-size:11px;color:var(--accent);text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .serpcell a:hover{text-decoration:underline}
  .reason{font-size:11.5px;color:var(--red);max-width:200px}
  .miniact{display:flex;gap:5px}
  .miniact button{border:1px solid var(--line);background:#fff;border-radius:6px;padding:3px 8px;font-size:12px;font-weight:600}
  .miniact button.y:hover{background:var(--green-soft);border-color:var(--green);color:var(--green)}
  .miniact button.n:hover{background:var(--red-soft);border-color:var(--red);color:var(--red)}
  /* identifiers */
  .idgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:10px}
  .idcard{border:1px solid var(--line);border-radius:10px;padding:12px}
  .idcard .top{display:flex;justify-content:space-between;align-items:baseline}
  .idcard .word{font-weight:700;font-size:14px}
  .idcard .freq{font-size:11.5px;color:var(--muted)}
  .idcard .bar{height:4px;background:#eef0f4;border-radius:3px;margin:8px 0 10px;overflow:hidden}
  .idcard .bar i{display:block;height:100%;background:var(--accent)}
  .idclass{display:flex;gap:4px;flex-wrap:wrap}
  .idclass button{border:1px solid var(--line);background:#fff;border-radius:6px;padding:3px 7px;font-size:11px;font-weight:600;color:var(--muted)}
  .idclass button.core.on{background:var(--green);color:#fff;border-color:var(--green)}
  .idclass button.rej.on{background:var(--red);color:#fff;border-color:var(--red)}
  .idclass button.brand.on{background:var(--blue);color:#fff;border-color:var(--blue)}
  .idclass button.loc.on{background:var(--amber);color:#fff;border-color:var(--amber)}
  /* questions */
  .q{border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:12px}
  .q .qh{font-weight:650;font-size:14px;margin-bottom:3px}
  .q .qm{color:var(--muted);font-size:12.5px;margin-bottom:12px}
  .q .qopts{display:flex;gap:8px;flex-wrap:wrap}
  .q .qopts button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 14px;font-weight:600}
  .q .qopts button.keep:hover{background:var(--green-soft);border-color:var(--green);color:var(--green)}
  .q .qopts button.drop:hover{background:var(--red-soft);border-color:var(--red);color:var(--red)}
  .q.answered{opacity:.55}
  .q .ans{font-weight:700;margin-left:8px}
  .empty{text-align:center;padding:50px 20px;color:var(--muted)}
  .empty svg{opacity:.4;margin-bottom:10px}
  .phasetabs{display:inline-flex;gap:6px;background:#eef0f4;padding:4px;border-radius:10px;margin-bottom:16px}
  .phasetabs button{border:0;background:transparent;padding:8px 18px;border-radius:7px;font-weight:650;color:var(--muted)}
  .phasetabs button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .banner{background:var(--accent-soft);border:1px solid #c8caf9;color:var(--accent-d);padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:flex;gap:10px;align-items:center}
  .toast{position:fixed;bottom:22px;right:22px;background:var(--navy);color:#fff;padding:12px 18px;border-radius:10px;box-shadow:var(--shadow);font-weight:600;font-size:13px;opacity:0;transform:translateY(8px);transition:.2s;z-index:99}
  .toast.show{opacity:1;transform:none}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:10px}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .dot{width:9px;height:9px;border-radius:3px;display:inline-block}
  .scrollx{overflow-x:auto}
  .pager{display:flex;gap:8px;align-items:center;justify-content:flex-end;padding:10px 14px;border-top:1px solid var(--line);color:var(--muted);font-size:12.5px}
</style>
</head>
<body>
<!-- LOGIN GATE -->
<div class="login" id="login" style="display:none">
  <div class="login-card">
    <div class="login-logo">gush<span>work</span><span class="login-dot"></span></div>
    <div class="login-sub">Topic Shortlisting Tool</div>
    <form id="loginForm">
      <input type="password" id="loginPw" placeholder="Enter password" autocomplete="current-password" autofocus>
      <button class="btn" type="submit">Sign in</button>
      <div class="login-err" id="loginErr"></div>
    </form>
    <div class="login-foot">Internal tool · access restricted</div>
  </div>
</div>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="side">
    <div class="brand">Topic Shortlisting<small id="brandClient">Keyword → Topic curation</small></div>
    <nav class="steps" id="stepNav"></nav>
    <div class="side-foot">Local & private · auto-saved in this browser<div class="signout" id="signout">Sign out</div></div>

function _snap(){ return STATE.rows.map(r=>({id:r.id,status:r.status,reason:r.reason,autoReason:r.autoReason,manual:r.manual})); }
function _commit(label, before){
  const changed=[];
  for(let i=0;i<STATE.rows.length;i++){ const r=STATE.rows[i], b=before[i];
    if(b&&(b.status!==r.status||b.reason!==r.reason||b.manual!==r.manual)) changed.push({id:r.id, from:{status:b.status,reason:b.reason,autoReason:b.autoReason,manual:b.manual}});
  }
  if(changed.length){ STATE.history.unshift({ts:Date.now(), label, n:changed.length, changed}); if(STATE.history.length>60)STATE.history.length=60; }
}
function undoEntry(i){ const e=STATE.history[i]; if(!e)return;
  e.changed.forEach(c=>{ const r=STATE.rows.find(x=>x.id===c.id); if(r){ r.status=c.from.status; r.reason=c.from.reason; r.autoReason=c.from.autoReason; r.manual=c.from.manual; } });

}
function decide(pred, action, label){

}

const CONSUMER_WELLNESS=/\b(yoga|meditation|mindfulness|vipassana|nidra|vinyasa|pranayama|retreat|breathwork|sound bath|reiki)\b/;
function classifyProfile(r){
  const t=(r.kw+' '+(r.sec||'')).toLowerCase();
  let best='General', bestN=0;
  for(const p of PROFILES){ const m=t.match(p.rxg); const n=m?m.length:0; if(n>bestN){bestN=n;best=p.name;} }
  // fallback: a consumer-wellness topic with no clearer signal is an individual/consumer search
  if(best==='General' && CONSUMER_WELLNESS.test(t)) best='Individual / Consumer';

const IGNORE_DOMAINS=/(wikipedia|wikihow|britannica|fandom|youtube|youtu\.be|vimeo|reddit|quora|stackexchange|stackoverflow|medium\.com|tumblr|facebook|instagram|tiktok|twitter|x\.com|pinterest|linkedin\.com|snapchat|threads\.net|discord|news\.ycombinator)/;

const DOMAIN_SIGNALS=[

/* detect a BRANDED / navigational query from the SERP: one brand dominates the results,
   or a distinctive keyword word matches a top ranking domain (e.g. "soulful" → soulfulleadership.com). */
function serpBrandHit(r){
  if(!r.serpDone || !(r.serp||[]).length) return null;
  const domains=(r.serp||[]).map(hostOf).filter(h=>h && !IGNORE_DOMAINS.test(h));
  if(!domains.length) return null;
  const cnt={}; domains.forEach(h=>cnt[h]=(cnt[h]||0)+1);
  const dom=Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0];
  if(dom && dom[1]>=3) return dom[0];                               // one site owns the results → navigational/brand
  const top3=domains.slice(0,5);                                   // a distinctive keyword word is in a top domain
  const toks=(r.kw.toLowerCase().match(/[a-z][a-z'-]{3,}/g)||[]).filter(w=>!NONDISTINCT.has(w));
  for(const t of toks){ const tt=t.replace(/[^a-z0-9]/g,''); if(tt.length<4)continue; const hit=top3.find(h=>h.replace(/[^a-z0-9]/g,'').includes(tt)); if(hit)return hit; }

}

function classifyProfileFromSerp(r){
  if(!r.serpDone) return null;

  let best=null,bn=0;
  for(const p of PROFILES){ const m=text.match(p.rxg); const n=m?m.length:0; if(n>bn){bn=n;best=p.name;} }

function bindTags(inId,addId,wrapId,arr,cls){
  const wrap=$('#'+wrapId);

    wrap.querySelectorAll('x').forEach(x=>x.onclick=()=>{arr.splice(+x.dataset.i,1);paint();});};
  const add=()=>{const v=$('#'+inId).value.trim();if(v){arr.push(v);$('#'+inId).value='';paint();}};
  $('#'+addId).onclick=add;

/* ============================ FILE LOAD ============================ */
function loadFile(file){
  const ext=file.name.split('.').pop().toLowerCase();
  const reader=new FileReader();
  STATE.detected=null;
  reader.onload=e=>{
    try{
      let aoa;
      if(ext==='csv'){ aoa = csvToAoa(e.target.result); }
      else { const wb=XLSX.read(e.target.result,{type:'array'});
             autoPopulateFromWorkbook(wb);          // fill Services / Industry / Competitors tabs
             aoa = pickAkrSheet(wb); }
      ingest(aoa);
      processRows();                     // auto identifiers + auto-reject, behind the scenes
      saveState(); renderStats();
      toast('Loaded '+STATE.rows.length+' topics');
      VIEWS.setup();
    }catch(err){alert('Could not parse file: '+err.message);}
  };
  if(ext==='csv')reader.readAsText(file); else reader.readAsArrayBuffer(file);
}
// pick the AKR sheet. Prefer a tab literally named "AKR" (highest trailing number, e.g. AKR2 over AKR1);
// otherwise the sheet whose header has "primary keyword" with the most rows.
function pickAkrSheet(wb){
  const aoaOf=n=>XLSX.utils.sheet_to_json(wb.Sheets[n],{header:1,blankrows:false});
  const named=wb.SheetNames.filter(n=>/akr/i.test(n));
  if(named.length){
    named.sort((a,b)=>(parseInt((b.match(/\d+/)||[0])[0])||0)-(parseInt((a.match(/\d+/)||[0])[0])||0));
    return aoaOf(named[0]);
  }
  let best=null,bestRows=-1;
  wb.SheetNames.forEach(n=>{ const aoa=aoaOf(n); if(!aoa.length)return;
    const head=(aoa[0]||[]).map(h=>norm(h));
    if(head.some(h=>h.includes('keyword')) && aoa.length>bestRows){best=aoa;bestRows=aoa.length;} });
  return best || aoaOf(wb.SheetNames[0]);
}
// auto-fill config from the Services / Industry / Competitors tabs of one workbook
function autoPopulateFromWorkbook(wb){
  const c=STATE.config, det={services:0,industries:0,competitors:0};
  const aoaOf=n=>XLSX.utils.sheet_to_json(wb.Sheets[n],{header:1,blankrows:false});
  const colVals=(aoa,ci,startRow=1)=>{const out=[];for(let r=startRow;r<aoa.length;r++){const v=(aoa[r]||[])[ci];if(v!=null&&String(v).trim())out.push(String(v).replace(/\s+/g,' ').trim());}return out;};
  wb.SheetNames.forEach(name=>{
    const ln=norm(name);
    if(/service/.test(ln)){
      const aoa=aoaOf(name); if(!aoa.length)return;
      const head=(aoa[0]||[]).map(h=>norm(h));
      const di=head.findIndex(h=>h.includes('detail')); const ti=head.findIndex(h=>h.includes('type'));
      // prefer the specific "Details" offerings; fall back to Service Type, then first column
      let vals = di>=0 ? colVals(aoa,di) : (ti>=0 ? colVals(aoa,ti) : colVals(aoa,0));
      vals=[...new Set(vals)];
      if(vals.length){c.services=vals;det.services=vals.length;c.offering='Services';}
    } else if(/industr/.test(ln)){
      const aoa=aoaOf(name); const vals=[...new Set(colVals(aoa,0))];
      if(vals.length){c.industries=vals;det.industries=vals.length;}
    } else if(/competitor/.test(ln)){
      const aoa=aoaOf(name); const vals=[...new Set(colVals(aoa,0))];
      if(vals.length){c.competitors=vals;det.competitors=vals.length;}
    }
  });
  STATE.detected=det;
}
function csvToAoa(text){
  const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){cur+='"';i++;}else q=false;} else cur+=ch; }
    else { if(ch==='"')q=true; else if(ch===','){row.push(cur);cur='';}
           else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';}
           else if(ch==='\r'){} else cur+=ch; } }
  if(cur||row.length){row.push(cur);rows.push(row);}
  return rows;
}
function ingest(aoa){
  if(!aoa||!aoa.length)throw new Error('empty file');
  const head=aoa[0].map(h=>norm(h).trim());
  const find=(...keys)=>{for(const k of keys){const i=head.findIndex(h=>h.includes(k));if(i>=0)return i;}return -1;};
  const ci={
    kw:find('primary keyword','keyword'),
    type:find('page type','type'),
    topic:find('topic'),
    sec:find('secondary'),
    vol:find('search volume','volume'),
    rel:find('relevance','score'),
  };
  if(ci.kw<0)ci.kw=0;
  const out=[];
  for(let r=1;r<aoa.length;r++){
    const a=aoa[r]; if(!a)continue;
    const kw=(a[ci.kw]||'').toString().trim();
    if(!kw)continue;
    const vol=parseInt((a[ci.vol]||'').toString().replace(/[^0-9]/g,''))||0;
    let type=(a[ci.type]||'').toString().trim();
    // only two phases: Service/Product (transactional) vs Blog (everything else, incl. Category)
    type=/serv|product/i.test(type) ? 'Service' : 'Blog';
    out.push({
      id:r, kw, pageType:type,
      topic:(a[ci.topic]||'').toString().trim(),
      sec:(a[ci.sec]||'').toString().trim(),   // parsed but intentionally ignored everywhere
      vol, rel:(a[ci.rel]||'').toString().trim(),
      status:'pending', reason:'', autoReason:'', manual:false, idents:[], typeIds:[], modIds:[], combo:'', family:'', profile:'', profileEdited:false, serp:[], serpTitles:[], serpDone:false,
    });
  }
  STATE.rows=out;
  STATE.identifiers={}; STATE.questions=[]; STATE.majorIds=[];
}
/* Runs automatically after upload: build identifiers + auto-reject (both hidden from the UI). */
function processRows(){
  buildIdentifiers();
  computeRowIdents();
  applySerpCache();            // restore previously-fetched rankings (no API calls)
  classifyProfiles();          // customer-profile (ICP) per query
  runAutoReject();
}

/* ============================ REJECTION ENGINE ============================ */
function blob(r){return norm(r.kw+' '+r.topic);}   /* secondary keywords intentionally ignored */
function evalRow(r){
  const c=STATE.config, R=STATE.rules, t=blob(r);
  const hit=[];
  if(R.zero && r.vol<=0) hit.push('Zero search volume');
  if(R.free && /\bfree\b/.test(t)) hit.push('Free keyword');
  if(R.nearme && /\bnear me\b/.test(t)) hit.push('"Near me" query');
  if(R.competitor){const b=c.competitors.find(x=>x&&t.includes(norm(x)));if(b)hit.push('Other brand: '+b);}
  if(R.location && c.geoMode==='restricted'){
    const served=c.locations.map(norm);
    const found=[...US_STATES,...BIG_CITIES].filter(loc=>new RegExp('\\b'+loc.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b').test(t));
    const unserved=found.filter(loc=>!served.some(s=>s.includes(loc)||loc.includes(s)));
    if(unserved.length && !found.some(loc=>served.some(s=>s.includes(loc)||loc.includes(s))))
      hit.push('Location not served: '+unserved[0]);
  }
  if(R.info){
    // only reject informational on transactional pages (Service/Product/Category). keep for blogs.
    if(r.pageType!=='Blog' && INFO_RX.test(t)) hit.push('Informational/DIY intent');
  }
  if(R.jobs && JOBS_RX.test(t)) hit.push('Job / education-seeker intent');
  if(R.format && FORMAT_RX.test(t)) hit.push('Wrong-format / login/app intent');
  if(R.org && (ORG_RX.test(t)||BIG_BRANDS_RX.test(t))) hit.push('Other company / brand');
  if(R.lowrel){const n=parseFloat(r.rel);if(!isNaN(n)&&n<=STATE.lowRelThreshold)hit.push('Low relevance score ('+r.rel+')');}
  // identifier-driven rejection
  const idRej=Object.keys(STATE.identifiers).filter(w=>STATE.identifiers[w]==='rej'||STATE.identifiers[w]==='brand'||STATE.identifiers[w]==='loc');
  for(const w of idRej){ if(new RegExp('\\b'+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b').test(t)){
      const lbl=STATE.identifiers[w]; hit.push((lbl==='brand'?'Other brand identifier: ':lbl==='loc'?'Unserved location identifier: ':'Irrelevant identifier: ')+w); break; } }
  return hit;
}
function runAutoReject(){
  let n=0;
  STATE.rows.forEach(r=>{
    if(r.manual)return;            // don't override manual decisions
    const hit=evalRow(r);
    if(hit.length){r.status='rejected';r.autoReason=hit.join('; ');r.reason=r.autoReason;n++;}
    else if(r.status==='rejected'&&!r.manual){r.status='pending';r.reason='';r.autoReason='';}
  });
  return n;
}
function ruleCount(key){
  const saved=JSON.stringify(STATE.rules);
  const obj=JSON.parse(saved); Object.keys(obj).forEach(k=>obj[k]=false); obj[key]=true;
  const real=STATE.rules; STATE.rules=obj;
  let n=0; STATE.rows.forEach(r=>{if(evalRow(r).length)n++;});
  STATE.rules=real; return n;
}

// add person rule into engine
const PERSON_RX=/\b(deepak chopra|jennifer piercy|rod stryker|sara raymond|ally boothroyd|lizzy hill|kristen rose|sn goenka|goenka|shawn achor|steve wolf)\b/;
const _evalOrig=evalRow;
evalRow=function(r){const hit=_evalOrig(r);if(STATE.rules.person&&PERSON_RX.test(blob(r)))hit.push('Specific person/author name');return hit;};

/* ============================ IDENTIFIERS (auto, hidden) ============================ */
/* Service/Product TYPE identifiers are multi-word PHRASES ("mindfulness training",
   "keynote speaker", "yoga retreat") — seeded from the Services tab + frequent
   two-word phrases in the keywords. Falls back to single words when no phrase fits. */
const rxEsc=s=>s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
function contentTokens(s){ return (String(s).toLowerCase().match(/[a-z][a-z'-]{1,}/g)||[]).filter(w=>!STOP.has(w)&&w.length>=3); }
function buildIdentifiers(){
  const uni={}, bi={}, seed=new Set();
  // seed type-phrases from the Services tab (adjacent content words that are both "type")
  (STATE.config.services||[]).forEach(s=>{const t=contentTokens(s);for(let i=0;i<t.length-1;i++){if(identCategory(t[i])==='type'&&identCategory(t[i+1])==='type')seed.add(t[i]+' '+t[i+1]);}});
  STATE.rows.forEach(r=>{
    const t=contentTokens(r.kw), su=new Set(), sb=new Set();
    t.forEach(w=>{ if(!su.has(w)){su.add(w);uni[w]=(uni[w]||0)+1;} });
    for(let i=0;i<t.length-1;i++){ if(identCategory(t[i])==='type'&&identCategory(t[i+1])==='type'){const b=t[i]+' '+t[i+1]; if(!sb.has(b)){sb.add(b);bi[b]=(bi[b]||0)+1;}} }
  });
  seed.forEach(b=>{ if(!bi[b])bi[b]=2; });           // ensure known service phrases are recognised
  STATE._freq=uni;
  // type PHRASES: frequent 2-word offerings (appear in >=3 topics), most common first
  STATE.majorPhrases=Object.entries(bi).filter(([,n])=>n>=3).sort((a,b)=>b[1]-a[1]).slice(0,60).map(([p])=>p);
  seed.forEach(p=>{ if(!STATE.majorPhrases.includes(p))STATE.majorPhrases.push(p); });   // always keep service-tab phrases
  // type WORDS: fallback single offering nouns
  STATE.majorTypeWords=Object.entries(uni).filter(([w])=>identCategory(w)==='type').sort((a,b)=>b[1]-a[1]).slice(0,30).map(([w])=>w);
  // ranking list for pickType: phrases first (more specific), then single words
  STATE.majorIds=[...STATE.majorPhrases, ...STATE.majorTypeWords];
}
/* Tag each row: TYPE = phrases present (else single offering word); MODIFIER = any qualifier word. */
function computeRowIdents(){
  const phrases=STATE.majorPhrases||[], words=STATE.majorTypeWords||[];
  STATE.rows.forEach(r=>{
    const kw=' '+r.kw.toLowerCase()+' ';
    const has=p=>new RegExp('(^|\\s)'+rxEsc(p)+'(\\s|$)').test(kw);
    let typ=phrases.filter(has);                       // prefer multi-word phrases
    if(!typ.length)typ=words.filter(has);              // fall back to single words
    r.typeIds=typ;
    const toks=[...new Set(r.kw.toLowerCase().match(/[a-z][a-z'-]{1,}/g)||[])];
    r.modIds=toks.filter(t=>!STOP.has(t)&&identCategory(t)==='mod');
    r.idents=[...r.typeIds,...r.modIds];
  });
  // identifier = service TYPE + one or more MODIFIERS, and a FAMILY (for grouping into fewer tabs)
  STATE.rows.forEach(r=>{
    r.comboType = r.typeIds[0] || '(no type)';
    r.comboMods = pickMods(r);                       // array — can be multiple
    r.combo = r.comboMods.length ? r.comboType+' + '+r.comboMods.join(' + ') : r.comboType;
    r.family = familyOf(r);
  });
}
/* coarse families so similar identifiers merge into a handful of tabs (not 1 per combo) */
const TYPE_FAMILIES=[
  ['Leadership',                    /\bleadership|leaders?\b/],
  ['Mindset',                       /\bmindset\b/],
  ['Mindfulness',                   /\bmindful(ness)?\b/],
  ['Mental performance & wellbeing',/\b(mental|resilience|burnout|wellbeing|well-being|wellness|stress|emotional intelligence|performance|focus)\b/],
  ['Meditation',                    /\b(meditation|vipassana|nidra|breathwork)\b/],
  ['Yoga',                          /\b(yoga|vinyasa|pranayama|asana)\b/],
  ['Coaching',                      /\bcoach(ing|es)?\b/],
  ['Keynote & speaking',            /\b(keynote|speaker|speaking|emcee|moderator)\b/],
  ['Retreats',                      /\bretreats?\b/],
  ['Workshops',                     /\bworkshops?\b/],
  ['Training',                      /\btrainings?\b/],
  ['Conferences & events',          /\b(conference|summit|seminar|webinar|event)\b/],
  ['Programs',                      /\bprograms?\b/],
];
function familyOf(r){
  const t=r.kw.toLowerCase();                       // keyword only — topic text over-matches (e.g. "...business leaders")
  for(const [name,rx] of TYPE_FAMILIES){ if(rx.test(t)) return name; }
  return 'Other';                                   // unknown service words collapse to Other (less clutter)
}
/* group rows by family (counts via counts()) */
function buildFamilies(rows){
  const m=new Map();
  rows.forEach(r=>{const k=r.family||'Other'; if(!m.has(k))m.set(k,{key:k,rows:[]}); m.get(k).rows.push(r);});
  const arr=[...m.values()]; arr.forEach(counts);
  return arr;
}
VIEWS.ident=function(){
  buildIdentifiers();
  const freq=STATE._freq||{};
  const entries=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,60);
  const max=entries.length?entries[0][1]:1;
  // auto-suggest classes
  entries.forEach(([w])=>{ if(STATE.identifiers[w])return;

/* ============================ VIEW: Q&A ============================ */
function buildQuestions(){
  if(STATE.questions.length)return;
  const freq=STATE._freq||{};
  const c=STATE.config;
  const qs=[];
  // industry questions
  c.industries.forEach(ind=>{const key=norm(ind).split(/\s+/)[0];
    qs.push({id:'ind:'+ind, type:'keep-or-drop', word:key,
      h:`Is "${ind}" a relevant audience?`,
      m:`Keep = select every still-pending topic with "${key}". Drop = reject them all.`});});
  // top identifiers — the biggest topic groups to decide in bulk
  STATE.majorIds.slice(0,14)
    .filter(w=>!c.industries.some(i=>norm(i).includes(w)))
    .forEach(w=>qs.push({id:'w:'+w, type:'keep-or-drop', word:w,
      h:`Is "${w}" relevant to what the client offers?`,
      m:`Keep selects all pending "${w}" topics; Drop rejects every "${w}" topic.`}));
  STATE.questions=qs.map(q=>({...q,answer:null,kept:0,dropped:0}));
}
function countWord(w){const rx=new RegExp('\\b'+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b');return STATE.rows.filter(r=>rx.test(blob(r))).length;}
VIEWS.ask=function(){
  buildQuestions();
  const qs=STATE.questions;
  $('#view').innerHTML=`
  <div class="pagehead"><h2>Relevance Q&A</h2>
    <p>Decide the biggest topic groups in one click. <b>Select all</b> marks every pending topic in that group as selected; <b>Reject all</b> rejects the whole group. Auto-rejected rows (zero-volume, off-geo…) stay rejected. Optional — skip any you'd rather handle by hand.</p></div>
  <div class="card">
    <h3>Questions <span style="font-weight:400;color:var(--muted)">(${qs.filter(q=>q.answer).length}/${qs.length} answered)</span></h3>
    ${qs.length?qs.map((q,i)=>`
      <div class="q ${q.answer?'answered':''}">
        <div class="qh">${esc(q.h)}${q.answer==='keep'?`<span class="ans" style="color:var(--green)">✓ Kept ${q.kept} selected</span>`:q.answer==='drop'?`<span class="ans" style="color:var(--red)">✕ Dropped ${q.dropped}</span>`:q.answer==='skip'?`<span class="ans" style="color:var(--muted)">Skipped</span>`:''}</div>
        <div class="qm">${esc(q.m)}</div>
        ${q.answer?`<button class="btn ghost sm" data-i="${i}" data-a="undo" style="padding:2px 0">Undo</button>`:`<div class="qopts"><button class="keep" data-i="${i}" data-a="keep">Relevant — select all</button><button class="drop" data-i="${i}" data-a="drop">Not relevant — reject all</button><button data-i="${i}" data-a="skip" style="color:var(--muted)">Skip</button></div>`}
      </div>`).join(''):'<div class="empty">No questions generated. Add industries in Setup to generate audience questions.</div>'}
  </div>
  <div class="row-actions">
    <button class="btn" id="next">Continue to Shortlist →</button>
  </div>`;
  $('#view').querySelectorAll('[data-a]').forEach(b=>b.onclick=()=>{
    const q=STATE.questions[+b.dataset.i], a=b.dataset.a;
    const rx=new RegExp('\\b'+q.word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b');
    if(a==='undo'){ q.answer=null;q.kept=0;q.dropped=0;VIEWS.ask();return; }
    if(a==='skip'){q.answer='skip';VIEWS.ask();return;}
    q.answer=a; q.kept=0; q.dropped=0;
    STATE.rows.forEach(r=>{ if(!rx.test(blob(r)))return;
      if(a==='drop'){ if(r.status!=='rejected'){r.status='rejected';r.reason='Q&A: "'+q.word+'" not relevant';r.manual=true;} q.dropped++; }
      else { // keep = bulk-SELECT this group (only promote pending; auto-rejected stay rejected)
        if(r.status==='pending'){r.status='selected';r.reason='Q&A: "'+q.word+'" relevant';r.manual=true;q.kept++;} }
    });
    toast(a==='drop'?('Rejected '+q.dropped+' "'+q.word+'" topics'):('Selected '+q.kept+' "'+q.word+'" topics'));
    renderStats();VIEWS.ask();
  });
  $('#next').onclick=()=>go(2);
};

/* ============================ VIEW: SHORTLIST ============================ */
function pageTypes(){
  const set=[...new Set(STATE.rows.map(r=>r.pageType))];
  // transactional first (Service/Product/Category…), Blog last
  return set.sort((a,b)=>(a==='Blog')-(b==='Blog')||a.localeCompare(b));
}
/* ---- merged identifiers: one combined "qualifier + service-type" phrase per topic ---- */
const WEDGE=new Set(['corporate','executive','executives','team','teams','employee','employees','staff','workplace','workforce','company','business','b2b']);
/* the MODIFIER half of the identifier — can be MULTIPLE modifiers (e.g. corporate + online).
   Uses all lexicon modifiers present (B2B/wedge first), else the salient extra word. */
function pickMods(r){
  if(r.modIds.length){
    return [...r.modIds].sort((a,b)=>(WEDGE.has(b)-WEDGE.has(a))||a.localeCompare(b));  // wedge first, then alpha (stable key)
  }
  const head=r.typeIds[0]||''; const hw=new Set(head.split(' '));
  const extra=contentTokens(r.kw).find(w=>!hw.has(w));
  return extra ? [extra] : [];
}
function primMod(r){ return (r.comboMods&&r.comboMods[0]) || '(no modifier)'; }
function counts(o){o.total=o.rows.length;o.sel=o.rows.filter(r=>r.status==='selected').length;o.rej=o.rows.filter(r=>r.status==='rejected').length;o.pen=o.total-o.sel-o.rej;}
/* group phase rows by their merged identifier — single flat list */
function buildGroups(rows){
  const m=new Map();
  rows.forEach(r=>{const k=r.combo||'(no identifier)'; if(!m.has(k))m.set(k,{key:k,type:r.comboType,mods:r.comboMods||[],rows:[]}); m.get(k).rows.push(r);});
  const arr=[...m.values()]; arr.forEach(counts);
  arr.sort((a,b)=>b.total-a.total);
  return arr;
}
/* group phase rows by Customer Profile (ICP) */
function buildProfileGroups(rows){
  const m=new Map();
  rows.forEach(r=>{const k=r.profile||'General'; if(!m.has(k))m.set(k,{key:k,rows:[]}); m.get(k).rows.push(r);});
  const arr=[...m.values()]; arr.forEach(counts);
  return arr;
}
function applyProfileGroup(profile,key,action){
  const _b=_snap();
  const rows=STATE.rows.filter(r=>r.pageType===STATE.phase && r.profile===profile && (r.combo||'(no identifier)')===key);
  let n=0;
  rows.forEach(r=>{
    if(action==='select'){ if(r.status==='pending'){r.status='selected';r.reason='ICP '+profile+' · '+key;r.manual=true;n++;} }
    else if(action==='reject'){ if(r.status!=='rejected'){r.status='rejected';r.reason='ICP '+profile+' · '+key;r.manual=true;n++;} }
    else { r.status='pending';r.reason='';r.autoReason='';r.manual=false;n++; }
  });
  const msg=(action==='select'?'Kept ':action==='reject'?'Rejected ':'Reset ')+n+' · '+key;
  _commit(msg,_b); toast(msg);
  renderStats();render();
}
function applyProfile(profile,action){
  const _b=_snap();
  const rows=STATE.rows.filter(r=>r.pageType===STATE.phase && r.profile===profile);

  rows.forEach(r=>{

function applyGroup(key,action){

  const g=buildGroups(STATE.rows.filter(r=>r.pageType===STATE.phase)).find(x=>x.key===key);

}

  let icpGroups=buildProfileGroups(all).sort((a,b)=>{
    if((a.key==='Unclassified')!==(b.key==='Unclassified')) return a.key==='Unclassified'?1:-1;   // awaiting-rankings bucket last
    return (pendOnly?b.pen-a.pen:b.total-a.total)||b.total-a.total;
  });
  const icpVisible=pendOnly?icpGroups.filter(g=>g.pen>0):icpGroups;
  const icpBody=`
  <div class="tablewrap">
    <div class="tbar">
      <label style="display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;white-space:nowrap">
        <span class="sw" style="width:38px;height:21px"><input type="checkbox" id="gpend" ${pendOnly?'checked':''}><span class="sl"></span></span>
        Pending only
      </label>
      <input type="text" id="gsrch" placeholder="Find keyword / identifier…" value="${esc(STATE.groupSearch)}" style="width:200px">
      ${STATE.serpRunning
        ? `<span style="font-size:12.5px;font-weight:600;color:var(--accent)">⏳ Processing topics <span id="serpProg">…</span></span> <button class="btn sec sm" id="serpStop">Stop</button>`
        : (()=>{const n=STATE.rows.filter(r=>r.status==='pending'&&!r.serpDone&&r.pageType==='Service').length; return n?`<button class="btn sec sm" id="serpAll" title="Process pending topics (analyse rankings to set the ICP)">↻ Process topics (${n})</button>`:`<span style="font-size:12px;color:var(--green);font-weight:600">✓ Topics processed</span>`;})()}
      <span style="flex:1"></span>
      <span style="color:var(--muted);font-size:12px">${icpVisible.length} profiles · ${all.length} topics${pendOnly?` · ${all.filter(r=>r.status!=='pending').length} decided (hidden)`:''}</span>
      <button class="btn sm" id="export">⤓ Export CSV</button>
    </div>
    <div style="padding:8px 14px 12px">
      <div style="margin-bottom:8px;font-size:11.5px;color:var(--muted)"><span class="ichip">type</span> <span class="ichip mod">modifier</span></div>
      ${icpVisible.length?icpVisible.map(g=>{
        const open=!!STATE.groupExpanded['ICP:'+g.key];
        let subs=[]; if(open){ subs=buildGroups(g.rows); if(pendOnly)subs=subs.filter(s=>s.pen>0); subs.sort((a,b)=>(pendOnly?b.pen-a.pen:b.total-a.total)||b.total-a.total); }
        return `
        <div class="grp">
          <div class="grphead">
            <button class="caret gexp" data-k="ICP:${esc(g.key)}" title="${open?'Hide':'View'} identifiers">${open?'▾':'▸'}</button>
            <span class="grpchips"><span class="ichip" style="background:var(--blue-soft);color:var(--blue)">${esc(g.key)}</span></span>
            <span class="grpcounts">${g.key==='Unclassified'?`<span style="color:var(--amber)">⏳ <b>${g.pen}</b> awaiting rankings${STATE.serpRunning?' — fetching…':''}</span>`:gcount(g)}</span>
            <span class="grpbtns">
              <button class="btn sec sm icpact" data-k="${esc(g.key)}" data-a="select" ${g.pen?'':'disabled'}>✓ Approve all</button>
              <button class="btn sec sm icpact" data-k="${esc(g.key)}" data-a="reject" ${g.pen?'':'disabled'}>✕ Reject all</button>
              ${(g.sel||g.rej)?`<button class="btn ghost sm icpact" data-k="${esc(g.key)}" data-a="reset">Reset</button>`:''}
            </span>
          </div>
          ${open?`<div class="grpbody">${subs.length?subs.map(sg=>{const so=!!STATE.groupExpanded['ICPID:'+g.key+'||'+sg.key];
            return `
            <div class="modrow">
              <div class="modhead">
                <button class="caret gexp" data-k="ICPID:${esc(g.key)}||${esc(sg.key)}" title="${so?'Hide':'View'} topics">${so?'▾':'▸'}</button>
                <span class="grpchips"><span class="ichip">${esc(sg.type)}</span>${(sg.mods||[]).map(m=>`<span class="plus">+</span><span class="ichip mod">${esc(m)}</span>`).join('')}</span>
                <span class="grpcounts">${gcount(sg)}</span>
                <span class="grpbtns">
                  <button class="btn sec sm icpgact" data-p="${esc(g.key)}" data-k="${esc(sg.key)}" data-a="select" ${sg.pen?'':'disabled'}>✓ Keep all</button>
                  <button class="btn sec sm icpgact" data-p="${esc(g.key)}" data-k="${esc(sg.key)}" data-a="reject" ${sg.pen?'':'disabled'}>✕ Reject all</button>
                  ${(sg.sel||sg.rej)?`<button class="btn ghost sm icpgact" data-p="${esc(g.key)}" data-k="${esc(sg.key)}" data-a="reset">Reset</button>`:''}
                </span>
              </div>
              ${so?topicList(pendOnly?sg.rows.filter(r=>r.status==='pending'):sg.rows):''}
            </div>`;}).join(''):'<div class="empty" style="padding:18px">No identifiers match here.</div>'}</div>`:''}
        </div>`;}).join(''):`<div class="empty">${icpGroups.length&&pendOnly?'🎉 Every profile in this phase is decided. Turn off “Pending only” to see all topics.':'No profiles.'}</div>`}
    </div>
  </div>`;

  // shared rankings status (shown in every view's toolbar)
  const serpStatus = STATE.serpRunning
    ? `<span style="font-size:12.5px;font-weight:600;color:var(--accent)">⏳ Processing <span id="serpProg">…</span></span> <button class="btn sec sm" id="serpStop">Stop</button>`
    : (()=>{const n=STATE.rows.filter(r=>r.status==='pending'&&!r.serpDone&&r.pageType==='Service').length;return n?`<button class="btn sec sm" id="serpAll" title="Analyse rankings to set audience/ICP">↻ Process topics (${n})</button>`:`<span style="font-size:12px;color:var(--green);font-weight:600">✓ Processed</span>`;})();
  // ---------- A · GRID  (service type × audience) ----------
  const pendN=f=>all.filter(r=>r.family===f&&r.status==='pending').length;
  const pendP=p=>all.filter(r=>r.profile===p&&r.status==='pending').length;
  const famList=buildFamilies(all).sort((a,b)=>b.total-a.total).map(f=>f.key).filter(f=>pendN(f)>0);   // hide zero-topic options
  const profList=[...new Set(all.map(r=>r.profile))].filter(p=>pendP(p)>0).sort(profileSort);
  const cellRows=(f,p)=>all.filter(r=>r.family===f&&r.profile===p);
  const cstat=rs=>({pen:rs.filter(r=>r.status==='pending').length,sel:rs.filter(r=>r.status==='selected').length,rej:rs.filter(r=>r.status==='rejected').length,total:rs.length});
  const gridBody=`
  <div class="tablewrap">
    <div class="tbar"><b style="font-size:13px">Pick the pages to build</b><span style="color:var(--muted);font-size:12px;margin-left:8px">click a cell = keep that Type × Audience · row/col ✓✕ = bulk</span><span style="flex:1"></span>${serpStatus}<button class="btn sm" id="export">⤓ Export CSV</button></div>
    <div class="scrollx" style="padding:4px 12px 12px">
      <table class="gridtbl">
        <thead><tr><th class="gcorner">Type ＼ Audience</th>${profList.map(p=>`<th class="gcol">${esc(p)}<div class="ghbtns"><button class="gcolact" data-p="${esc(p)}" data-a="select" title="Keep all ${esc(p)}">✓</button><button class="gcolact" data-p="${esc(p)}" data-a="reject" title="Reject all ${esc(p)}">✕</button></div></th>`).join('')}</tr></thead>
        <tbody>${famList.map(f=>`<tr><th class="grow">${esc(f)}<span class="ghbtns"><button class="growact" data-f="${esc(f)}" data-a="select" title="Keep all ${esc(f)}">✓</button><button class="growact" data-f="${esc(f)}" data-a="reject" title="Reject all ${esc(f)}">✕</button></span></th>${profList.map(p=>{const s=cstat(cellRows(f,p));if(!s.total)return '<td class="gcell empty">·</td>';const seln=STATE.gridCell&&STATE.gridCell.f===f&&STATE.gridCell.p===p;return `<td class="gcell ${s.sel&&!s.pen?'kept':''} ${s.total?'haspen':''} ${seln?'sel':''}" data-f="${esc(f)}" data-p="${esc(p)}" title="View topics">${s.pen?`<b>${s.pen}</b>`:''}${s.sel?`<span class="gsel">✓${s.sel}</span>`:''}${!s.pen&&!s.sel?`<span style="color:var(--muted)">${s.rej}✕</span>`:''}</td>`;}).join('')}</tr>`).join('')}</tbody>
      </table>
    </div>
    <div class="muted" style="padding:8px 14px;font-size:12px">Click a cell to open its topics in a popup · row/column ✓✕ bulk-decide.</div>
  </div>`;

  // ---------- B · FILTERS  (audience → type → modifier, context-aware counts) ----------
  const audMatch=r=>!STATE.fAud.length||STATE.fAud.includes(r.profile);
  const typeMatch=r=>!STATE.fTypes.length||STATE.fTypes.includes(r.family);
  const modMatch=r=>!STATE.fMods.length||r.modIds.some(m=>STATE.fMods.includes(m));
  const matchPred=r=>audMatch(r)&&typeMatch(r)&&modMatch(r);
  const pend=all.filter(r=>r.status==='pending');
  // context-aware counts (each axis counts within the OTHER selected filters)
  const profCnt=p=>pend.filter(r=>r.profile===p&&typeMatch(r)&&modMatch(r)).length;
  const famCnt=f=>pend.filter(r=>r.family===f&&audMatch(r)&&modMatch(r)).length;
  const modCnt=m=>pend.filter(r=>r.modIds.includes(m)&&audMatch(r)&&typeMatch(r)).length;
  const audOpts=[...new Set(pend.map(r=>r.profile))].sort(profileSort).filter(p=>profCnt(p)>0||STATE.fAud.includes(p));
  const typeOpts=[...new Set(pend.map(r=>r.family))].filter(f=>famCnt(f)>0||STATE.fTypes.includes(f)).sort((a,b)=>famCnt(b)-famCnt(a));
  const modOpts=[...new Set(pend.flatMap(r=>r.modIds))].map(m=>[m,modCnt(m)]).filter(([m,n])=>n>0||STATE.fMods.includes(m)).sort((a,b)=>b[1]-a[1]).slice(0,30);
  const matchRows=pend.filter(matchPred);
  const matchN=matchRows.length;
  const modFreq={}; matchRows.forEach(r=>{const m=primMod(r);modFreq[m]=(modFreq[m]||0)+1;});
  matchRows.sort((a,b)=>(modFreq[primMod(b)]-modFreq[primMod(a)])||primMod(a).localeCompare(primMod(b))||b.vol-a.vol);
  const shown=matchRows.slice(0,400);
  const nChecked=shown.filter(r=>STATE.checked[r.id]).length;
  const filterRow=(label,allId,clrId,html,sep)=>`<div style="display:flex;gap:8px;align-items:baseline;flex-wrap:wrap;${sep?'padding-bottom:9px;margin-bottom:9px;border-bottom:1px solid var(--line)':'margin-bottom:6px'}"><b style="font-size:12px;width:82px">${label}</b><button class="btn ghost sm" id="${allId}">All</button><button class="btn ghost sm" id="${clrId}">Clear</button>${html}</div>`;
  const filtersBody=`
  <div class="tablewrap">
    <div class="tbar"><b style="font-size:13px">Pick relevant audiences, types &amp; modifiers</b><span style="flex:1"></span>${serpStatus}<button class="btn sm" id="export">⤓ Export CSV</button></div>
    <div style="padding:10px 14px;border-bottom:1px solid var(--line)">
      ${filterRow('Audiences','faAll','faClear',audOpts.map(p=>`<span class="fpill aud ${STATE.fAud.includes(p)?'on':''}" data-fa="${esc(p)}">${esc(p)} <span class="muted">${profCnt(p)}</span></span>`).join(''),true)}
      ${filterRow('Types','ftAll','ftClear',typeOpts.map(f=>`<span class="fpill type ${STATE.fTypes.includes(f)?'on':''}" data-ft="${esc(f)}">${esc(f)} <span class="muted">${famCnt(f)}</span></span>`).join(''),true)}
      ${filterRow('Modifiers','fmAll','fmClear',modOpts.map(([m,n])=>`<span class="fpill mod ${STATE.fMods.includes(m)?'on':''}" data-fm="${esc(m)}">${esc(m)} <span class="muted">${n}</span></span>`).join('')||'<span class="muted" style="font-size:12px">none</span>')}
      <div style="margin-top:8px"><button class="btn" id="applyFilters">Keep ${matchN} matching · reject the rest</button>
      <button class="btn ghost sm" id="resetAll" style="margin-left:6px"${(STATE.fAud.length||STATE.fTypes.length||STATE.fMods.length||nChecked)?'':' disabled'}>↺ Reset selection</button>
      <span class="muted" style="font-size:12px;margin-left:8px">${matchN} matching topics shown below (empty filter = “any”).</span></div>
    </div>
    <div class="tbar" style="border-bottom:1px solid var(--line)">
      <label class="chk" style="gap:6px"><input type="checkbox" id="chkAll" ${shown.length&&nChecked===shown.length?'checked':''}> <span style="font-size:12.5px">Select all shown</span></label>
      <button class="btn sec sm" id="keepChecked" ${nChecked?'':'disabled'}>✓ Keep checked (${nChecked})</button>
      <button class="btn sec sm" id="rejChecked" ${nChecked?'':'disabled'}>✕ Reject checked (${nChecked})</button>
    </div>
    <div class="scrollx">
      <table class="ftbl">
        <thead><tr><th style="width:30px"></th><th style="width:104px">Audience</th><th style="width:140px">Type</th><th style="width:82px">Modifier</th><th>Keyword — Topic</th><th style="width:124px">Secondary</th><th style="width:54px">Vol</th><th style="width:110px">Decide</th></tr></thead>
        <tbody>${shown.length?shown.map(r=>`<tr>
          <td><input type="checkbox" class="chk-row" data-id="${r.id}" ${STATE.checked[r.id]?'checked':''}></td>
          <td><span class="ichip aud">${esc(r.profile)}</span></td>
          <td><span class="ichip fam2" title="${esc(r.family)}">${esc(r.family)}</span></td>
          <td>${r.modIds.map(m=>`<span class="ichip mod">${esc(m)}</span>`).join('')||'<span class="muted">—</span>'}</td>
          <td><span class="kw">${esc(r.kw)}</span>${r.topic?`<span class="muted" style="font-size:11.5px"> — ${esc(r.topic)}</span>`:''}</td>
          <td>${secCell(r)}</td>
          <td>${r.vol.toLocaleString()}</td>
          <td><span class="miniact"><button class="y" data-id="${r.id}" data-act="selected">Keep</button><button class="n" data-id="${r.id}" data-act="rejected">Reject</button></span></td>
        </tr>`).join(''):'<tr><td colspan="8"><div class="empty">No matching topics.</div></td></tr>'}</tbody>
      </table>
      ${matchRows.length>400?`<div class="pager">Showing first 400 of ${matchRows.length}.</div>`:''}
    </div>
  </div>`;

  // ---------- SELECTED · live review of everything kept ----------
  const selRows=STATE.rows.filter(r=>r.status==='selected')
    .sort((a,b)=>profileSort(a.profile,b.profile)||a.family.localeCompare(b.family)||b.vol-a.vol);
  const selVol=selRows.reduce((s,r)=>s+r.vol,0);
  const selectedBody=`
  <div class="tablewrap">
    <div class="tbar"><b style="font-size:13px">${selRows.length} topic${selRows.length===1?'':'s'} selected</b>
      <span class="muted" style="font-size:12px">· ${selVol.toLocaleString()} total volume · updates live as you keep / reject</span>
      <span style="flex:1"></span><button class="btn sm" id="export">⤓ Export CSV</button></div>
    <div class="scrollx">
      <table class="ftbl">
        <thead><tr><th style="width:104px">Audience</th><th style="width:140px">Type</th><th style="width:82px">Modifier</th><th>Keyword — Topic</th><th style="width:124px">Secondary</th><th style="width:54px">Vol</th><th style="width:104px"></th></tr></thead>
        <tbody>${selRows.length?selRows.map(r=>`<tr>
          <td><span class="ichip aud">${esc(r.profile)}</span></td>
          <td><span class="ichip fam2" title="${esc(r.family)}">${esc(r.family)}</span></td>
          <td>${r.modIds.map(m=>`<span class="ichip mod">${esc(m)}</span>`).join('')||'<span class="muted">—</span>'}</td>
          <td><span class="kw">${esc(r.kw)}</span>${r.topic?`<span class="muted" style="font-size:11.5px"> — ${esc(r.topic)}</span>`:''}</td>
          <td>${secCell(r)}</td>
          <td>${r.vol.toLocaleString()}</td>
          <td><span class="miniact"><button class="n" data-id="${r.id}" data-act="pending" title="Remove from shortlist">↩ Remove</button></span></td>
        </tr>`).join(''):'<tr><td colspan="7"><div class="empty">No topics selected yet. Use the Filter & pick tab to shortlist.</div></td></tr>'}</tbody>
      </table>
    </div>
  </div>`;

  // ---------- HISTORY · session action log with undo ----------
  const fmtTime=ts=>{const d=new Date(ts);const p=x=>String(x).padStart(2,'0');return p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());};
  const hist=STATE.history;
  const historyBody=`
  <div class="tablewrap">
    <div class="tbar"><b style="font-size:13px">${hist.length} action${hist.length===1?'':'s'} this session</b>
      <span class="muted" style="font-size:12px">· newest first · undo restores each topic's previous status</span>
      <span style="flex:1"></span>${hist.length?'<button class="btn sec sm" id="undoLast">↩ Undo last</button>':''}</div>
    <div class="scrollx">
      <table class="ftbl" style="min-width:560px">
        <thead><tr><th style="width:90px">Time</th><th>Action</th><th style="width:80px">Topics</th><th style="width:96px"></th></tr></thead>
        <tbody>${hist.length?hist.map((e,i)=>`<tr>
          <td class="muted" style="font-variant-numeric:tabular-nums">${fmtTime(e.ts)}</td>
          <td>${esc(e.label)}</td>
          <td><b>${e.n}</b></td>
          <td><button class="btn ghost sm hundo" data-i="${i}">↩ Undo</button></td>
        </tr>`).join(''):'<tr><td colspan="4"><div class="empty">No actions yet — keep or reject some topics and they will be logged here so you can undo.</div></td></tr>'}</tbody>
      </table>
    </div>
  </div>`;

  // ---------- E · MODIFIER → TYPE  (audience filter + select-all at each level) ----------
  const eAll=all.filter(r=>STATE.eAud==='all'||r.profile===STATE.eAud);
  const eModMap=new Map(); eAll.forEach(r=>{const m=primMod(r); if(!eModMap.has(m))eModMap.set(m,[]); eModMap.get(m).push(r);});
  const eMods=[...eModMap.keys()].sort((a,b)=>a.localeCompare(b));   // modifier A→Z (primary)
  const tableBodyE=`
  <div class="tablewrap">
    <div class="tbar">
      <label style="font-size:12.5px;font-weight:600">Audience <select id="eAud" style="margin-left:6px">
        <option value="all" ${STATE.eAud==='all'?'selected':''}>All audiences</option>
        ${profList.map(p=>`<option value="${esc(p)}" ${STATE.eAud===p?'selected':''}>${esc(p)} (${all.filter(r=>r.profile===p&&r.status==='pending').length})</option>`).join('')}
      </select></label>
      ${STATE.eAud!=='all'?`<button class="btn sec sm eaudact" data-a="select">✓ Keep all</button><button class="btn sec sm eaudact" data-a="reject">✕ Reject all</button>`:''}
      <label style="display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600"><span class="sw" style="width:38px;height:21px"><input type="checkbox" id="gpend" ${pendOnly?'checked':''}><span class="sl"></span></span>Pending only</label>
      <span style="flex:1"></span>${serpStatus}<button class="btn sm" id="export">⤓ Export CSV</button>
    </div>
    <div style="padding:8px 14px 12px">
      <div class="muted" style="font-size:11.5px;margin-bottom:6px">Grouped by <b>modifier</b> → <b>type</b> (A→Z). ✓✕ selects all of a modifier or type.</div>
      ${eMods.map(m=>{const rows=eModMap.get(m),s=cstat(rows); if(pendOnly&&!s.pen)return ''; const mo=!!STATE.groupExpanded['E:'+m];
        const tMap=new Map(); rows.forEach(r=>{const t=r.comboType||'(no type)'; if(!tMap.has(t))tMap.set(t,[]); tMap.get(t).push(r);});
        const tList=[...tMap.keys()].sort((a,b)=>a.localeCompare(b));
        return `<div class="grp">
          <div class="grphead">
            <button class="caret gexp" data-k="E:${esc(m)}">${mo?'▾':'▸'}</button>
            <span class="grpchips"><span class="ichip mod">${esc(m)}</span></span>
            <span class="grpcounts">${gcount(s)}</span>
            <span class="grpbtns"><button class="btn sec sm emodact" data-m="${esc(m)}" data-a="select" ${s.pen?'':'disabled'}>✓ Keep all</button><button class="btn sec sm emodact" data-m="${esc(m)}" data-a="reject" ${s.pen?'':'disabled'}>✕ Reject all</button></span>
          </div>
          ${mo?`<div class="grpbody">${tList.map(t=>{const tr=tMap.get(t),ts=cstat(tr); if(pendOnly&&!ts.pen)return ''; const to=!!STATE.groupExpanded['ET:'+m+'||'+t]; return `
            <div class="modrow"><div class="modhead">
              <button class="caret gexp" data-k="ET:${esc(m)}||${esc(t)}">${to?'▾':'▸'}</button>
              <span class="grpchips"><span class="ichip">${esc(t)}</span></span>
              <span class="grpcounts">${gcount(ts)}</span>
              <span class="grpbtns"><button class="btn sec sm etypeact" data-m="${esc(m)}" data-t="${esc(t)}" data-a="select" ${ts.pen?'':'disabled'}>✓ Keep all</button><button class="btn sec sm etypeact" data-m="${esc(m)}" data-t="${esc(t)}" data-a="reject" ${ts.pen?'':'disabled'}>✕ Reject all</button></span>
            </div>${to?topicList(pendOnly?tr.filter(r=>r.status==='pending'):tr):''}</div>`;}).join('')}</div>`:''}
        </div>`;}).join('')||'<div class="empty">No topics.</div>'}
    </div>
  </div>`;

  // topic popup (A grid cell / B filter matches)
  let modalHtml='';
  if(STATE.modal){
    let title='', mrows=[];
    if(STATE.modal.type==='cell'){ mrows=all.filter(r=>r.family===STATE.modal.f&&r.profile===STATE.modal.p); title=`<span class="ichip">${esc(STATE.modal.f)}</span><span class="ichip aud">${esc(STATE.modal.p)}</span>`; }
    else { mrows=all.filter(matchPred); title='<b>Matching topics</b>'; }
    const s=cstat(mrows), list=pendOnly?mrows.filter(r=>r.status==='pending'):mrows;
    modalHtml=`<div class="modal" id="modalBg"><div class="modal-card">
      <div class="modal-head">${title}<span class="muted" style="font-size:12px">${s.pen} to review · ${s.sel}✓ · ${s.rej}✕</span>
        <button class="btn sec sm modact" data-a="select" ${s.pen?'':'disabled'}>✓ Keep all</button><button class="btn sec sm modact" data-a="reject" ${s.pen?'':'disabled'}>✕ Reject all</button>
        <span style="flex:1"></span><button class="modal-x" id="modalClose">✕</button></div>
      <div class="modal-body">${topicList(list)}</div></div></div>`;
  }

  let vm=STATE.viewMode; if(!['filters','selected','history'].includes(vm))vm=STATE.viewMode='filters';
  const blurb={filters:'Tick the audiences, types and modifiers that fit the client, then keep or reject the matching topics.',
    selected:'Every topic you have kept, updating live. Remove any that slipped in.',
    history:'Every keep / reject / reset action you took this session. Undo any of them to restore the previous status.'}[vm];
  $('#view').innerHTML=`

  $('#view').querySelectorAll('.vtab').forEach(b=>b.onclick=()=>{STATE.viewMode=b.dataset.vm;STATE.modal=null;render();});

  $('#view').querySelectorAll('.emodact').forEach(b=>b.onclick=()=>decide(r=>(STATE.eAud==='all'||r.profile===STATE.eAud)&&primMod(r)===b.dataset.m,b.dataset.a,'Modifier: '+b.dataset.m));
  $('#view').querySelectorAll('.etypeact').forEach(b=>b.onclick=()=>decide(r=>(STATE.eAud==='all'||r.profile===STATE.eAud)&&primMod(r)===b.dataset.m&&(r.comboType||'(no type)')===b.dataset.t,b.dataset.a,b.dataset.m+' / '+b.dataset.t));

  $('#view').querySelectorAll('.fpill[data-ft]').forEach(c=>c.onclick=()=>{const v=c.dataset.ft;STATE.fTypes=STATE.fTypes.includes(v)?STATE.fTypes.filter(x=>x!==v):[...STATE.fTypes,v];render();});
  $('#view').querySelectorAll('.fpill[data-fa]').forEach(c=>c.onclick=()=>{const v=c.dataset.fa;STATE.fAud=STATE.fAud.includes(v)?STATE.fAud.filter(x=>x!==v):[...STATE.fAud,v];render();});
  $('#view').querySelectorAll('.fpill[data-fm]').forEach(c=>c.onclick=()=>{const v=c.dataset.fm;STATE.fMods=STATE.fMods.includes(v)?STATE.fMods.filter(x=>x!==v):[...STATE.fMods,v];render();});
  if($('#ftAll'))$('#ftAll').onclick=()=>{STATE.fTypes=famList.slice();render();};
  if($('#ftClear'))$('#ftClear').onclick=()=>{STATE.fTypes=[];render();};
  if($('#faAll'))$('#faAll').onclick=()=>{STATE.fAud=profList.slice();render();};
  if($('#faClear'))$('#faClear').onclick=()=>{STATE.fAud=[];render();};
  if($('#fmAll'))$('#fmAll').onclick=()=>{STATE.fMods=[...new Set(STATE.rows.filter(r=>r.pageType===phase&&r.status==='pending').flatMap(r=>r.modIds))];render();};
  if($('#fmClear'))$('#fmClear').onclick=()=>{STATE.fMods=[];render();};
  // checkbox multi-select
  $('#view').querySelectorAll('.chk-row').forEach(c=>c.onchange=()=>{ if(c.checked)STATE.checked[c.dataset.id]=true; else delete STATE.checked[c.dataset.id]; const n=[...document.querySelectorAll('.chk-row:checked')].length; const k=$('#keepChecked'),rj=$('#rejChecked'); if(k){k.textContent='✓ Keep checked ('+n+')';k.disabled=!n;} if(rj){rj.textContent='✕ Reject checked ('+n+')';rj.disabled=!n;} });
  if($('#chkAll'))$('#chkAll').onchange=e=>{ document.querySelectorAll('.chk-row').forEach(c=>{c.checked=e.target.checked; if(e.target.checked)STATE.checked[c.dataset.id]=true; else delete STATE.checked[c.dataset.id];}); const n=e.target.checked?document.querySelectorAll('.chk-row').length:0; const k=$('#keepChecked'),rj=$('#rejChecked'); if(k){k.textContent='✓ Keep checked ('+n+')';k.disabled=!n;} if(rj){rj.textContent='✕ Reject checked ('+n+')';rj.disabled=!n;} };
  const applyChecked=act=>{ const _b=_snap(); const ids=new Set(Object.keys(STATE.checked)); let n=0; STATE.rows.forEach(r=>{ if(!ids.has(String(r.id)))return; if(act==='select'){if(r.status==='pending'){r.status='selected';r.reason='Shortlisted';r.manual=true;n++;}} else {if(r.status!=='rejected'){r.status='rejected';r.reason='Not relevant';r.manual=true;n++;}} }); STATE.checked={}; const msg=(act==='select'?'Kept ':'Rejected ')+n+' checked'; _commit(msg,_b); toast(msg); renderStats(); render(); };
  if($('#keepChecked'))$('#keepChecked').onclick=()=>applyChecked('select');
  if($('#rejChecked'))$('#rejChecked').onclick=()=>applyChecked('reject');
  if($('#resetAll'))$('#resetAll').onclick=()=>{ STATE.fAud=[];STATE.fTypes=[];STATE.fMods=[];STATE.checked={}; toast('Selection reset'); render(); };
  $('#view').querySelectorAll('.seccell').forEach(c=>c.onclick=()=>c.classList.toggle('expanded'));
  if($('#applyFilters'))$('#applyFilters').onclick=()=>{ const _b=_snap(); STATE.rows.forEach(r=>{ if(r.pageType!==phase||r.status!=='pending')return; if(matchPred(r)){r.status='selected';r.reason='Shortlisted (filters)';r.manual=true;} else {r.status='rejected';r.reason='Out of scope (filters)';r.manual=true;} }); _commit('Applied filters · kept '+matchN, _b); toast('Applied filters'); renderStats(); render(); };
  if($('#viewMatches'))$('#viewMatches').onclick=()=>{STATE.modal={type:'filter'};render();};

  // handlers
  $('#view').querySelectorAll('.phasetabs [data-p]').forEach(b=>b.onclick=()=>{STATE.phase=b.dataset.p;STATE.page=0;render();});
  if($('#toBlog'))$('#toBlog').onclick=()=>{STATE.phase='Blog';STATE.page=0;render();};
  if($('#export'))$('#export').onclick=exportCsv;
  const svcPending=()=>STATE.rows.filter(r=>r.status==='pending'&&r.pageType==='Service');
  if($('#serpAll'))$('#serpAll').onclick=()=>fetchSerpBulk(svcPending());
  if($('#serpStop'))$('#serpStop').onclick=()=>{STATE.serpCancel=true;};
  // auto-fetch rankings once per page load (only where a key or the /api proxy is available)
  const onServer = /^https?:$/.test(location.protocol) && !/^(localhost|127\.|0\.0\.0\.0|\[|$)/.test(location.hostname);
  if((STATE.config.serperKey||onServer) && !STATE.serpAuto && !STATE.serpRunning && svcPending().some(r=>!r.serpDone)){
    STATE.serpAuto=true; setTimeout(()=>fetchSerpBulk(svcPending(), true), 60);
  }
  if($('#icpNext'))$('#icpNext').onclick=()=>go(2);
  if($('#gpend'))$('#gpend').onchange=e=>{STATE.groupPendingOnly=e.target.checked;render();};
  if($('#gsrch'))$('#gsrch').oninput=e=>{STATE.groupSearch=e.target.value;render();};
  $('#view').querySelectorAll('.gexp').forEach(b=>b.onclick=()=>{STATE.groupExpanded[b.dataset.k]=!STATE.groupExpanded[b.dataset.k];render();});
  $('#view').querySelectorAll('.gact').forEach(b=>b.onclick=()=>applyGroup(b.dataset.k, b.dataset.a));
  $('#view').querySelectorAll('.icpact').forEach(b=>b.onclick=()=>applyProfile(b.dataset.k, b.dataset.a));
  $('#view').querySelectorAll('.icpgact').forEach(b=>b.onclick=()=>applyProfileGroup(b.dataset.p, b.dataset.k, b.dataset.a));
  $('#view').querySelectorAll('.miniact button[data-id]').forEach(b=>b.onclick=()=>{
    const _b=_snap();
    const r=STATE.rows.find(x=>x.id==b.dataset.id); r.status=b.dataset.act; r.manual=true;
    if(b.dataset.act==='selected'&&/^Group|ICP|Page|Shortlisted|Out of scope|identifier|brand|Location|Zero|Free|Near|Informational|Job|Wrong|relevance|person|Other/i.test(r.reason))r.reason='';
    _commit((b.dataset.act==='selected'?'Kept':b.dataset.act==='rejected'?'Rejected':'Moved')+' 1 · '+r.kw, _b);
    renderStats();render();
  });
  if($('#undoLast'))$('#undoLast').onclick=()=>undoEntry(0);
  $('#view').querySelectorAll('.hundo').forEach(b=>b.onclick=()=>undoEntry(+b.dataset.i));

VIEWS.short=()=>renderShort('icp');
/* ============================ SERP (Serper.dev) ============================ */
function hostOf(u){ try{return new URL(u).hostname.replace(/^www\./,'');}catch(e){return u;} }
/* persistent keyword→rankings cache (survives reloads AND re-uploads; separate from the session) */
const SERP_CACHE_KEY='topicShortlist.serpCache.v1';
let SERP_CACHE={};
function loadSerpCache(){ try{SERP_CACHE=JSON.parse(localStorage.getItem(SERP_CACHE_KEY)||'{}');}catch(e){SERP_CACHE={};} }
function saveSerpCache(){ try{localStorage.setItem(SERP_CACHE_KEY, JSON.stringify(SERP_CACHE));}catch(e){} }
/* apply SERP results to a row: set ICP from page titles + reject branded queries */
function applySerpResult(r){
  if(!r.profileEdited) r.profile = classifyProfileFromSerp(r) || classifyProfile(r);
  const brand=serpBrandHit(r);
  if(brand && !r.manual && r.status!=='rejected'){ r.status='rejected'; r.reason='Branded query — results dominated by '+brand; r.manual=true; }
}
/* restore cached rankings onto rows with no API call (called on upload/process) */
function applySerpCache(){
  STATE.rows.forEach(r=>{ if(r.serpDone)return; const c=SERP_CACHE[r.kw]; if(c){ r.serp=c.serp||[]; r.serpTitles=c.titles||[]; r.serpDone=true; applySerpResult(r); } });
}
async function fetchSerp(r){
  const cached=SERP_CACHE[r.kw];
  if(cached){ r.serp=cached.serp||[]; r.serpTitles=cached.titles||[]; r.serpDone=true; applySerpResult(r); return {cached:true}; }
  const key=(STATE.config.serperKey||'').trim(), gl=(STATE.config.serpGl||'').trim();
  let res;
  if(key){
    const payload={q:r.kw,num:10,page:1};
    if(/^[a-z]{2}$/i.test(gl)) payload.gl=gl.toLowerCase(); else if(gl) payload.location=gl;
    res=await fetch('https://google.serper.dev/search',{method:'POST',headers:{'X-API-KEY':key,'Content-Type':'application/json'},body:JSON.stringify(payload)});
  } else {
    res=await fetch('/api/serp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({q:r.kw,gl})});
  }
  if(!res.ok) throw new Error('Serper '+res.status+(key?'':' (set SERPER_KEY in Vercel, or paste a key in Setup)'));
  const j=await res.json();
  const items=(j.organic||[]).slice(0,10);
  r.serp=items.map(o=>o.link||'');
  r.serpTitles=items.filter(o=>{const h=hostOf(o.link||'');return !IGNORE_DOMAINS.test(h)&&!isHomepage(o.link||'');}).map(o=>((o.title||'')+' '+(o.snippet||'')).trim());
  r.serpDone=true;
  SERP_CACHE[r.kw]={serp:r.serp,titles:r.serpTitles}; saveSerpCache();   // cache by keyword
  applySerpResult(r);
  return {cached:false};
}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
async function fetchSerpBulk(rows, auto){
  rows=rows.filter(r=>!r.serpDone && r.status!=='rejected');   // never spend calls on rejected topics
  if(!rows.length){ if(!auto)toast('Nothing to fetch (rejected topics are skipped)'); return; }
  if(STATE.serpRunning)return;
  STATE.serpRunning=true; STATE.serpCancel=false; render();   // show the live status bar
  let done=0,err=0;
  for(const r of rows){
    if(STATE.serpCancel)break;
    let hit=false;
    try{ const o=await fetchSerp(r); hit=o&&o.cached; }catch(e){ err++; if(err===1)toast('SERP error: '+e.message); }
    done++;
    const pe=document.getElementById('serpProg'); if(pe)pe.textContent=done+'/'+rows.length;
    if(done%10===0){renderStats();saveState();}
    if(!hit) await sleep(300);   // no rate-limit wait for cached results
  }
  STATE.serpRunning=false;
  saveState(); toast('Rankings '+(STATE.serpCancel?'stopped at '+done:'done · '+done+' fetched')+(err?' · '+err+' errors':'')); render();
}
function exportCsv(){
  const cols=['Primary Keyword','Secondary Keywords','Page Type','Topic','Total Search Volume','Relevance Score','Service/Product Type','Modifier','Customer Profile','Decision','Reason'];
  const q=s=>'"'+String(s==null?'':s).replace(/"/g,'""')+'"';
  const decLabel=s=>s==='selected'?'Approved':s==='rejected'?'Rejected':'Pending';
  const lines=[cols.join(',')];
  STATE.rows.forEach(r=>lines.push([
    r.kw, r.sec, r.pageType, r.topic, r.vol, r.rel,
    r.typeIds.join('; '),                       // identifier columns — each can hold more than one
    r.modIds.join('; '),
    r.profile,
    decLabel(r.status),                         // Decision: Approved / Rejected / Pending
    r.reason
  ].map(q).join(',')));
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='shortlist.csv';a.click();
  toast('Exported '+STATE.rows.length+' rows');
}

/* ============================ PERSISTENCE ============================ */
const LS_KEY='topicShortlist.v1';
function saveState(){ try{ if(!STATE.rows.length)return;
  // strip the bulky per-row rankings (kept in the separate SERP cache) so the session stays small
  const slim={...STATE, history:[], rows:STATE.rows.map(r=>{const o={...r}; delete o.serp; delete o.serpTitles; return o;})};
  localStorage.setItem(LS_KEY, JSON.stringify(slim)); }catch(e){} }
function loadState(){ try{ const s=localStorage.getItem(LS_KEY); if(!s)return false; const p=JSON.parse(s);
  const rules={...STATE.rules, ...(p.rules||{})};      // merge so new default flags (e.g. org) survive an old session
  const config={...STATE.config, ...(p.config||{})};
  Object.assign(STATE, p); STATE.rules=rules; STATE.config=config;
  if(!Array.isArray(STATE.history))STATE.history=[];
  return !!(STATE.rows&&STATE.rows.length); }catch(e){return false;} }
function clearSession(){ if(confirm('Start over? This clears the loaded AKR and all decisions on this device.')){ localStorage.removeItem(LS_KEY); STATE.rows=[]; STATE.step=0; location.reload(); } }
function exportSession(){
  const blob=new Blob([JSON.stringify(STATE)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='topic-session.json';a.click();
  toast('Session saved to file');
}
function importSession(file){
  const r=new FileReader();
  r.onload=e=>{ try{ Object.assign(STATE, JSON.parse(e.target.result)); saveState(); toast('Session loaded'); render(); }catch(err){ alert('Invalid session file'); } };
  r.readAsText(file);
}
// autosave: periodic + on tab hide / unload (no per-handler instrumentation needed)
setInterval(saveState, 4000);
window.addEventListener('beforeunload', saveState);
document.addEventListener('visibilitychange', ()=>{ if(document.hidden) saveState(); });

/* ============================ AUTH GATE ============================ */
const AUTH_KEY='topicShortlist.auth';
const PW_HASH='37e7e38f0d3366828be4a4c594093d280a7cd0a46f5449c0a99c4d6fe0d17cc2'; // sha-256 of the access password
async function sha256(s){ const b=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s)); return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join(''); }
function bootApp(){
  loadSerpCache();
  loadState();
  STATE.serpRunning=false; STATE.serpCancel=false; STATE.serpAuto=false;   // reset transient rankings flags each load
  render();
}
function showApp(){ document.getElementById('login').style.display='none'; document.querySelector('.app').style.display=''; bootApp(); }
function signOut(){ localStorage.removeItem(AUTH_KEY); location.reload(); }
function initAuth(){
  const app=document.querySelector('.app'), login=document.getElementById('login');
  if(localStorage.getItem(AUTH_KEY)==='1'){ showApp(); return; }
  app.style.display='none'; login.style.display='flex';
  document.getElementById('loginForm').onsubmit=async e=>{
    e.preventDefault();
    const pw=document.getElementById('loginPw').value;
    const err=document.getElementById('loginErr');
    try{
      if(await sha256(pw)===PW_HASH){ localStorage.setItem(AUTH_KEY,'1'); showApp(); }
      else { err.textContent='Incorrect password'; document.getElementById('loginPw').select(); }
    }catch(_){ err.textContent='This browser blocks secure crypto — open over https.'; }
  };
}
document.getElementById('signout').onclick=signOut;

/* ============================ BOOT ============================ */
initAuth();
